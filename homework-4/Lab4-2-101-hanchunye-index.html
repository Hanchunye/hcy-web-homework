
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>太空探索新闻资讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 20px;
        }
        .news-container {
            width: 800px;
            margin: 0 auto;
        }
        .breadcrumb {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .breadcrumb a {
            color: #337ab7;
            text-decoration: none;
        }
        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 15px 0;
        }
        .content-wrapper {
            display: flex;
            gap: 20px;
        }
        .main-news {
            flex: 2;
        }
        .news-item {
            margin-bottom: 15px;
        }
        .news-item h4 {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }
        .news-img-group {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .news-img-group img {
            width: 180px;
            height: 120px;
            object-fit: cover;
        }
        .news-author {
            font-size: 12px;
            color: #999;
        }
        .hot-news {
            flex: 1;
        }
        .hot-news h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }
        .hot-item {
            margin-bottom: 12px;
        }
        .hot-item a {
            display: block;
            font-size: 13px;
            color: #337ab7;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .hot-item img {
            width: 95%;
            height: 115px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="news-container">
        <div class="breadcrumb">
            <a href="#">频道>科技>太空探索</a>
        </div>
        <hr>
        <div class="content-wrapper">
            <div class="main-news">
                <div class="news-item">
                    <h4>飞行了200多亿公里的旅行者1号，为何不会撞上太空中的小行星</h4>
                    <div class="news-img-group">
                        <img src="image/tu1.webp" alt="旅行者1号">
                        <img src="image/tu2.jpg" alt="太空景象">
                    </div>
                    <p class="news-author">科学探秘 10分钟前 · 来自北京</p>
                </div>
                <div class="news-item">
                    <h4>欧洲探测器从4亿公里外传回多张照片</h4>
                    <div class="news-img-group">
                        <img src="image/tu3.jpg" alt="探测器照片">
                        <img src="image/tu4.webp" alt="星球特写">
                    </div>
                    <p class="news-author">天文在线 5分钟前 · 来自上海</p>
                </div>
                <div class="news-item">
                    <h4>为什么太空没有氧气，陨石仍然能够燃烧</h4>
                    <div class="news-img-group">
                        <img src="image/tu5.webp" alt="陨石燃烧">
                        <img src="image/tu6.jpg" alt="陨石特写">
                    </div>
                    <p class="news-author">宇宙科普 3分钟前 · 来自广州</p>
                </div>
            </div>
            <div class="hot-news">
                <h4>热文推荐</h4>
                <div class="hot-item">
                    <a href="#">研究表明：人类的自然寿命为120岁</a>
                    <img src="image/tu7.jpg" alt="人类寿命研究">
                </div>
                <div class="hot-item">
                    <a href">白矮星了不用重新算，一个冷门，现象一经，立马干净刷新</a>
                    <img src="image/tu8.jpg" alt="白矮星">
                </div>
                <div class="hot-item">
                    <a href="#">俗语“八月十二三更，四季无收成”，一定是真的吗</a>
                    <img src="image/tu9.jpg" alt="乡村景象">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
